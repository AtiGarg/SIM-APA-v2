model:
  backbone: yolov10
  backbone_variant: yolov10s
  feature_layer: P5
  raw_feature_channels: 512
  feature_channels: 256
  feature_height: 20
  feature_width: 20

sim:
  use_adaptive_weights: true
  alpha: 0.8
  beta: 0.2
  background_weight: 1.0
  min_importance: 1.0
  max_importance: 4.5

adaptive_sim:
  input_dim: 4
  hidden_dim: 16
  output_dim: 1

deepjscc:
  input_channels: 256
  latent_channels: 32
  compression_ratio: 8
